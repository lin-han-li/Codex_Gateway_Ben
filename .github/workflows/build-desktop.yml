name: Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            script: dist:win
            artifact_name: codex-gateway-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
          - os: ubuntu-latest
            label: Linux
            script: dist:linux
            artifact_name: codex-gateway-linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.tar.gz
          - os: macos-latest
            label: macOS
            script: dist:mac
            artifact_name: codex-gateway-macos
            artifact_paths: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bun run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
          generate_release_notes: true
