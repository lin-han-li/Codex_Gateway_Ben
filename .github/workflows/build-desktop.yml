name: Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            script: dist:win
            artifact_name: codex-gateway-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
          - os: ubuntu-latest
            label: Linux x64
            script: dist:linux
            artifact_name: codex-gateway-linux-x64
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.tar.gz
          - os: ubuntu-24.04-arm
            label: RK3588 Desktop
            script: dist:linux-arm64
            artifact_name: codex-gateway-rk3588-desktop
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.tar.gz
          - os: macos-latest
            label: macOS
            script: dist:mac
            artifact_name: codex-gateway-macos
            artifact_paths: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version sync
        run: node scripts/assert-release-version-sync.mjs

      - name: Build desktop artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bun run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  build-rk3588-bundle:
    name: Build RK3588 Server Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version sync
        run: node scripts/assert-release-version-sync.mjs

      - name: Verify server-deploy bundle
        run: |
          cd server-deploy
          bun install
          bun run check

      - name: Build RK3588 source bundle
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "${VERSION}" || "${VERSION}" == "${GITHUB_REF_NAME}" ]]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          BUNDLE_DIR="$(node scripts/package-server-deploy-bundle.mjs "${VERSION}" "server-rk3588-linux-arm64")"
          tar -C "dist-server" -czf "dist-server/$(basename "${BUNDLE_DIR}").tar.gz" "$(basename "${BUNDLE_DIR}")"

      - name: Upload RK3588 bundle
        uses: actions/upload-artifact@v4
        with:
          name: codex-gateway-rk3588-server
          path: dist-server/*.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build
      - build-rk3588-bundle
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Verify version sync
        run: node scripts/assert-release-version-sync.mjs

      - name: Show release files
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
          generate_release_notes: true
